services:
  mongo:
    image: docker.io/library/mongo:7
    container_name: mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure:3
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/tripplanner?retryWrites=true&w=majority&connectTimeoutMS=30000&socketTimeoutMS=30000&serverSelectionTimeoutMS=30000&maxPoolSize=50&minPoolSize=10&maxIdleTimeMS=60000&waitQueueTimeoutMS=30000
      SPRING_DATA_MONGODB_DATABASE: tripplanner
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    ports:
      - "8088:8080"
    networks:
      - app-network
    container_name: app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
    stop_grace_period: 30s
    stop_signal: SIGTERM
    init: true
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 1G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M

networks:
  app-network:
    name: trip-planner-network
    driver: bridge

volumes:
  mongo-data:
